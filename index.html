<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebey Gembher - Fixed Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f3f4f6; overflow-x: hidden; }
        .bg-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background-color: #22c55e; color: #000; transition: all 0.2s; }
        .btn-primary:hover:not(:disabled) { background-color: #4ade80; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .tab-active { background: #22c55e; color: #000; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .loader { border: 3px solid rgba(34, 197, 94, 0.1); border-top: 3px solid #22c55e; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="selection:bg-green-500/30">

    <header class="border-b border-white/10 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="sparkles" class="text-black w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Gebey Gembher</h1>
            </div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">by: Fahrul Anam</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-8 pb-24">
        <!-- Tab Navigation -->
        <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
            <div class="flex gap-1 p-1 bg-white/5 rounded-xl border border-white/5">
                <button id="tab-describe" onclick="setTab('describe')" class="tab-active px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all">
                    <i data-lucide="camera" class="w-4 h-4"></i> Deskripsi
                </button>
                <button id="tab-generate" onclick="setTab('generate')" class="px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 text-gray-400 hover:bg-white/5 transition-all">
                    <i data-lucide="image" class="w-4 h-4"></i> Generate
                </button>
            </div>

            <div id="auto-mode-container" class="hidden">
                <button id="auto-mode-toggle" onclick="toggleAutoMode()" class="flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/5 text-gray-500 hover:border-green-500/30 transition-all group">
                    <i data-lucide="zap" id="zap-icon" class="w-4 h-4"></i>
                    <span class="text-xs font-bold uppercase">Auto: <span id="auto-status">OFF</span></span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            <!-- Kolom Input -->
            <div class="space-y-6">
                <div id="drop-area" class="relative aspect-square rounded-2xl border-2 border-dashed border-white/10 bg-white/5 hover:border-green-500/50 transition-all flex flex-col items-center justify-center overflow-hidden cursor-pointer">
                    <div id="img-preview-box" class="hidden w-full h-full relative">
                        <img id="main-preview" src="" class="w-full h-full object-cover">
                        <button onclick="resetInput()" class="absolute top-4 right-4 p-2 bg-black/60 hover:bg-red-500 text-white rounded-full transition-all">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div id="upload-hint" class="text-center p-6">
                        <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/5">
                            <i data-lucide="upload" class="text-gray-400 w-6 h-6"></i>
                        </div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Klik / Drag / Paste Gambar</p>
                    </div>
                    <input type="file" id="input-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>

                <div id="generate-inputs" class="hidden space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Instruksi Prompt</label>
                        <button onclick="triggerAutoPrompt()" id="btn-auto-prompt" class="text-[10px] font-bold text-green-500 hover:text-green-400 uppercase flex items-center gap-1">
                            <i data-lucide="wand-2" class="w-3 h-3"></i> Auto Prompt
                        </button>
                    </div>
                    <textarea id="prompt-text" placeholder="Contoh: Ubah suasana menjadi malam hari dengan lampu neon..." class="w-full h-24 bg-white/5 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-green-500/50 transition-all resize-none"></textarea>
                </div>

                <button id="btn-execute" onclick="startProcess()" class="btn-primary w-full py-4 font-bold rounded-xl flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btn-execute-text">ANALISIS SEKARANG</span>
                </button>
            </div>

            <!-- Kolom Output -->
            <div class="space-y-6">
                <div class="min-h-[400px] bg-card rounded-2xl overflow-hidden flex flex-col">
                    <div class="px-5 py-3 border-b border-white/10 flex items-center justify-between bg-white/[0.02]">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Hasil Output</span>
                        <div id="action-buttons" class="hidden flex gap-2">
                            <button id="btn-copy" onclick="copyToClipboard()" class="p-2 hover:bg-white/10 rounded-lg text-gray-400 hover:text-green-500 transition-colors">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                            <button id="btn-download" onclick="triggerDownload()" class="hidden p-2 hover:bg-white/10 rounded-lg text-gray-400 hover:text-green-500 transition-colors">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="render-area" class="p-8 flex-1 flex flex-col items-center justify-center relative">
                        <!-- Idle State -->
                        <div id="state-idle" class="text-center opacity-20">
                            <i data-lucide="sparkles" class="w-12 h-12 mx-auto mb-2"></i>
                            <p class="text-xs font-bold uppercase">Menunggu Perintah</p>
                        </div>
                        
                        <!-- Loading State -->
                        <div id="state-loading" class="hidden flex flex-col items-center gap-4">
                            <div class="loader"></div>
                            <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest animate-pulse">Memproses AI...</p>
                        </div>

                        <!-- Result Display -->
                        <div id="res-text-box" class="hidden w-full text-left text-gray-300 leading-relaxed text-sm bg-white/5 p-5 rounded-xl border border-white/5 overflow-y-auto max-h-[300px]"></div>
                        
                        <div id="res-image-box" class="hidden w-full">
                            <img id="output-image" class="w-full h-auto rounded-xl shadow-2xl border border-white/10">
                        </div>
                    </div>
                </div>

                <div id="error-box" class="hidden p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-500 shrink-0"></i>
                    <p id="error-msg" class="text-xs text-red-400"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inisialisasi
        const apiKey = ""; // Disediakan oleh sistem runtime
        let currentTab = 'describe';
        let isAutoMode = false;
        let base64Image = null;
        let generatedImageUrl = null;

        lucide.createIcons();

        // Elemen UI
        const fileInput = document.getElementById('input-file');
        const mainPreview = document.getElementById('main-preview');
        const previewBox = document.getElementById('img-preview-box');
        const uploadHint = document.getElementById('upload-hint');
        const promptInput = document.getElementById('prompt-text');

        // Navigasi Tab
        function setTab(tab) {
            currentTab = tab;
            // Update UI Tab
            document.getElementById('tab-describe').className = tab === 'describe' ? 'tab-active px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all' : 'px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 text-gray-400 hover:bg-white/5 transition-all';
            document.getElementById('tab-generate').className = tab === 'generate' ? 'tab-active px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all' : 'px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 text-gray-400 hover:bg-white/5 transition-all';
            
            // Show/Hide Elements
            document.getElementById('generate-inputs').classList.toggle('hidden', tab !== 'generate');
            document.getElementById('auto-mode-container').classList.toggle('hidden', tab !== 'generate');
            document.getElementById('btn-execute-text').innerText = tab === 'describe' ? 'ANALISIS SEKARANG' : 'GENERATE SEKARANG';
            
            clearResult();
            lucide.createIcons();
        }

        // Penanganan Gambar
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        window.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) handleFile(items[i].getAsFile());
            }
        });

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                mainPreview.src = e.target.result;
                previewBox.classList.remove('hidden');
                uploadHint.classList.add('hidden');
                
                if (isAutoMode && currentTab === 'generate') autoGenerate();
            };
            reader.readAsDataURL(file);
        }

        function resetInput() {
            base64Image = null;
            mainPreview.src = '';
            previewBox.classList.add('hidden');
            uploadHint.classList.remove('hidden');
            fileInput.value = '';
            clearResult();
        }

        function toggleAutoMode() {
            isAutoMode = !isAutoMode;
            const btn = document.getElementById('auto-mode-toggle');
            const status = document.getElementById('auto-status');
            const icon = document.getElementById('zap-icon');
            
            if (isAutoMode) {
                btn.classList.add('text-green-400', 'border-green-500/50', 'bg-green-500/10');
                status.innerText = 'ON';
                icon.classList.add('fill-green-400');
            } else {
                btn.classList.remove('text-green-400', 'border-green-500/50', 'bg-green-500/10');
                status.innerText = 'OFF';
                icon.classList.remove('fill-green-400');
            }
        }

        // Logika Utama AI
        async function startProcess() {
            if (!base64Image) return showError("Silakan upload gambar terlebih dahulu.");
            if (currentTab === 'generate' && !promptInput.value && !isAutoMode) return showError("Masukkan prompt instruksi.");

            setLoading(true);
            hideError();
            
            try {
                if (currentTab === 'describe') {
                    await callDescribeAPI();
                } else {
                    await callGenerateAPI(promptInput.value);
                }
            } catch (err) {
                showError("Gagal terhubung ke API. Silakan coba lagi.");
            } finally {
                setLoading(false);
            }
        }

        async function callDescribeAPI() {
            const systemPrompt = "Deskripsikan gambar detail. JANGAN sebut Etnis, Rambut, Gaya Rambut, Warna Rambut, Kumis, Janggut. CUKUP ekspresi. Tambah '(gambar referensi)' setelah subjek utama. Mulai langsung ke subjek.";
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Deskripsikan gambar ini secara detail sesuai aturan." }, { inlineData: { mimeType: "image/png", data: base64Image } }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                })
            });
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) renderText(text);
            else throw new Error("Kosong");
        }

        async function callGenerateAPI(prompt) {
            const finalPrompt = prompt || "Cinematic and detailed transformation";
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: finalPrompt }, { inlineData: { mimeType: "image/png", data: base64Image } }] }],
                    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                })
            });
            const data = await response.json();
            const b64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
            if (b64) renderImage(`data:image/png;base64,${b64}`);
            else throw new Error("Kosong");
        }

        async function triggerAutoPrompt() {
            if (!base64Image) return showError("Upload gambar dulu.");
            setLoading(true);
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Berikan 1 prompt inggris singkat modifikasi gambar ini." }, { inlineData: { mimeType: "image/png", data: base64Image } }] }]
                    })
                });
                const data = await response.json();
                promptInput.value = data.candidates?.[0]?.content?.parts?.[0]?.text || "Cinematic artistic style";
            } catch (e) {
                promptInput.value = "Cinematic style";
            } finally {
                setLoading(false);
            }
        }

        async function autoGenerate() {
            setLoading(true);
            try {
                // Get Auto Prompt First
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Give 1 short english prompt to enhance this image." }, { inlineData: { mimeType: "image/png", data: base64Image } }] }]
                    })
                });
                const data = await response.json();
                const p = data.candidates?.[0]?.content?.parts?.[0]?.text || "Cinematic style";
                promptInput.value = p;
                await callGenerateAPI(p);
            } catch (e) {
                showError("Auto generate gagal.");
            } finally {
                setLoading(false);
            }
        }

        // Utilitas UI
        function setLoading(s) {
            document.getElementById('state-loading').classList.toggle('hidden', !s);
            document.getElementById('state-idle').classList.toggle('hidden', s || base64Image === null);
            document.getElementById('btn-execute').disabled = s;
            if (s) clearResult();
        }

        function renderText(text) {
            const box = document.getElementById('res-text-box');
            box.innerText = text;
            box.classList.remove('hidden');
            document.getElementById('res-image-box').classList.add('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');
            document.getElementById('btn-download').classList.add('hidden');
            document.getElementById('state-idle').classList.add('hidden');
        }

        function renderImage(src) {
            generatedImageUrl = src;
            const img = document.getElementById('output-image');
            img.src = src;
            document.getElementById('res-image-box').classList.remove('hidden');
            document.getElementById('res-text-box').classList.add('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');
            document.getElementById('btn-download').classList.remove('hidden');
            document.getElementById('state-idle').classList.add('hidden');
        }

        function clearResult() {
            document.getElementById('res-text-box').classList.add('hidden');
            document.getElementById('res-image-box').classList.add('hidden');
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('state-idle').classList.remove('hidden');
            generatedImageUrl = null;
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            document.getElementById('error-msg').innerText = msg;
            box.classList.remove('hidden');
            setTimeout(hideError, 5000);
        }

        function hideError() {
            document.getElementById('error-box').classList.add('hidden');
        }

        function copyToClipboard() {
            const text = document.getElementById('res-text-box').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Berhasil disalin!");
            }).catch(() => {
                // Fallback
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Berhasil disalin!");
            });
        }

        function triggerDownload() {
            if (!generatedImageUrl) return;
            // Gunakan metode Blob untuk menghindari blokir iframe browser
            const base64Parts = generatedImageUrl.split(',');
            const contentType = base64Parts[0].split(':')[1].split(';')[0];
            const byteCharacters = atob(base64Parts[1]);
            const byteArrays = [];
            
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            
            const blob = new Blob(byteArrays, {type: contentType});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gebey-gembher-${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
